services:
  - type: web
    name: anong-ai
    runtime: docker
    plan: standard
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/ready
    autoDeployTrigger: checksPass
    envVars:
      - key: PORT
        value: 8003
      - key: ANONG_ALLOWED_ORIGINS
        value: https://kla2009k.github.io
