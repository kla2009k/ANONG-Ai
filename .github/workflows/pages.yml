name: Deploy static demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-react/package-lock.json
      - run: npm ci
        working-directory: web-react
      - name: Build project-site bundle
        run: npm run build
        working-directory: web-react
        env:
          VITE_BASE_PATH: /ANONG-Ai/
          VITE_ROUTER_BASE: /ANONG-Ai
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - name: Add SPA fallback
        run: |
          cp web-dist/index.html web-dist/404.html
          for route in analyze datasets gallery reports demo deployment performance knowledge history ask model about settings login; do
            mkdir -p "web-dist/$route"
            cp web-dist/index.html "web-dist/$route/index.html"
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-dist
      - id: deployment
        uses: actions/deploy-pages@v4
