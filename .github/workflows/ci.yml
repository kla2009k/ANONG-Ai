name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Python tests
        id: python-tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee unittest.log
      - name: Surface Python test failure
        if: failure() && steps.python-tests.outcome == 'failure'
        shell: bash
        run: |
          message="$(tail -n 160 unittest.log)"
          message="${message//'%'/'%25'}"
          message="${message//$'\r'/'%0D'}"
          message="${message//$'\n'/'%0A'}"
          echo "::error title=Python unittest failure::$message"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-react/package-lock.json
      - run: npm ci
        working-directory: web-react
      - run: npm run build
        working-directory: web-react
      - run: python tools/audit_claims.py --all
